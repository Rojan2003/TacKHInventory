<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TacKH Reports</title>

<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

/* 🌈 GLOBAL */
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
}

/* 🌟 LAYOUT */
.layout {
  display: flex;
  min-height: 100vh;
}

/* SIDEBAR */
.sidebar {
  width: 220px;
  background: #111827;
  color: white;
  padding: 1.5rem;
}

/* MAIN */
.main {
  flex: 1;
  padding: 2rem;
  background: #eef1f5;
}

/* TOP */
.top-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logout-btn {
  background: #e53935;
  color: white;
  border: none;
  padding: 0.5rem 1rem;
  border-radius: 8px;
  cursor: pointer;
}

/* FILTER */
.filter-card {
  background: white;
  padding: 1rem;
  border-radius: 12px;
  display: flex;
  gap: 1rem;
  margin: 1rem 0;
  align-items: center;
}

select, input, button {
  padding: 0.6rem;
  border-radius: 8px;
  border: 1px solid #ccc;
}

/* SUMMARY */
.summary {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px,1fr));
  gap: 1rem;
}

.summary-card {
  background: white;
  padding: 1rem;
  border-radius: 10px;
}

/* CHART */
.chart-container {
  width: 100%;
  max-width: 500px;
  height: 250px;
  margin: 1rem auto;
  background: #fff;
  padding: 1rem;
  border-radius: 12px;
}

/* ROW */
.row {
  display: flex;
  align-items: center;
  gap: 1rem;
}

.col { flex: 1; }

.code {
  font-weight: bold;
  color: #555;
}

.name { flex: 2; }

.total {
  text-align: right;
  font-weight: bold;
  color: #1976d2;
}

/* CARDS */
.report-cards {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px,1fr));
  gap: 1rem;
  margin-top: 1rem;
}

.report-card {
  background: white;
  padding: 1rem;
  border-radius: 10px;
  border-left: 5px solid #1976d2;
}

/* TABLE */
table {
  width: 100%;
  background: white;
  border-collapse: collapse;
  margin-top: 1rem;
}

th {
  text-align: left;
  background: #f9fafb;
}

th, td {
  padding: 10px;
  border-bottom: 1px solid #ddd;
}

td:last-child {
  font-weight: bold;
  color: #1976d2;
}

/* 🔥 MODERN LOGIN */
.login-container {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #1e3a8a, #0f172a);
}

.login-card {
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(15px);
  padding: 2rem;
  border-radius: 16px;
  width: 320px;
  text-align: center;
  color: white;
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

.login-card h2 {
  margin-bottom: 1.5rem;
}

/* INPUT */
.login-card input {
  width: 100%;
  padding: 0.7rem;
  border-radius: 10px;
  border: none;
  margin-bottom: 1rem;
  outline: none;
}

/* BUTTON */
.login-card button {
  width: 100%;
  padding: 0.7rem;
  border-radius: 10px;
  border: none;
  background: #4f46e5;
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

.login-card button:hover {
  background: #6366f1;
  transform: translateY(-2px);
}

</style>
</head>

<body>
<div id="app">

<!-- LOGIN -->
<div v-if="!authenticated" class="login-container">
  <div class="login-card">
    <h2>🔐 TacKH Access</h2>
    <input type="password" v-model="password" placeholder="Enter password">
    <button @click="login">Login</button>
  </div>
</div>

<!-- MAIN -->
<div v-if="authenticated" class="layout">

  <div class="sidebar">
    <h2>TacKH</h2>
  </div>

  <div class="main">

    <div class="top-bar">
      <h1>Reports</h1>
      <button class="logout-btn" @click="logout">Logout</button>
    </div>

    <div class="filter-card">
      <select v-model="selectedCongregation" @change="fetchReport">
        <option value="" disabled>Select Congregation</option>
        <option>East</option>
        <option>West</option>
        <option>Central</option>
        <option>Tagalog</option>
        <option>SLC</option>
      </select>

      <input type="month" v-model="selectedMonth" @change="fetchReport">

      <button @click="toggleView">
        {{ viewMode === 'cards' ? 'Table' : 'Cards' }}
      </button>

      <button @click="exportCSV">Export</button>
    </div>

    <div class="summary" v-if="reportData.length">
      <div class="summary-card">
        Total Records: {{ reportData.length }}
      </div>
      <div class="summary-card">
        Total Quantity: {{ totalQuantity }}
      </div>
    </div>

    <div class="chart-container">
      <canvas id="chart"></canvas>
    </div>

    <div v-if="viewMode === 'cards'" class="report-cards">
      <div v-for="item in reportData" class="report-card">
        <div class="row">
          <div class="col code">{{ item['Literature Code'] }}</div>
          <div class="col name">{{ item['Literature Name'] }}</div>
          <div class="col total">{{ item['Total'] }}</div>
        </div>
      </div>
    </div>

    <table v-if="viewMode === 'table'">
      <thead>
        <tr>
          <th>Code</th>
          <th>Name</th>
          <th>Total</th>
        </tr>
      </thead>
      <tbody>
        <tr v-for="item in reportData">
          <td>{{ item['Literature Code'] }}</td>
          <td>{{ item['Literature Name'] }}</td>
          <td>{{ item['Total'] }}</td>
        </tr>
      </tbody>
    </table>

  </div>
</div>
</div>

<script>
const { createApp } = Vue;

createApp({
  data() {
    return {
      authenticated: false,
      password: '',

      selectedMonth: '',
      selectedCongregation: '',
      reportData: [],
      viewMode: 'cards',
      chart: null
    }
  },

  computed: {
    totalQuantity() {
      return this.reportData.reduce((sum, i) => sum + Number(i['Total'] || 0), 0);
    }
  },

  methods: {
    login() {
      if (this.password === "congregation_123") {
        this.authenticated = true;
      }
    },

    logout() {
      this.authenticated = false;
    },

    toggleView() {
      this.viewMode = this.viewMode === 'cards' ? 'table' : 'cards';
    },

    async fetchReport() {
      if (!this.selectedMonth || !this.selectedCongregation) return;

      const url = `https://script.google.com/macros/s/AKfycbzO3FEM3m7nDKgFIKafPRtLji92uh4KV2khpTW_WGzicUMI6_2UYhJ9nsGBfuemp8Rp/exec?month=${this.selectedMonth}&congregation=${this.selectedCongregation}`;

      const res = await fetch(url);
      this.reportData = await res.json();

      this.$nextTick(() => this.renderChart());
    },

    renderChart() {
      const ctx = document.getElementById('chart');

      if (this.chart) this.chart.destroy();

      this.chart = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: this.reportData.map(i => i['Literature Name']),
          datasets: [{
            label: 'Total',
            data: this.reportData.map(i => Number(i['Total']))
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false
        }
      });
    },

    exportCSV() {
      let csv = "Code,Name,Total\n";

      this.reportData.forEach(i => {
        csv += `${i['Literature Code']},${i['Literature Name']},${i['Total']}\n`;
      });

      const blob = new Blob([csv]);
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'report.csv';
      a.click();
    }
  }

}).mount('#app');
</script>

</body>
</html>
